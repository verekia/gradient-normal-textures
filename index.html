<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luminance extraction + normal packer for dynamic recoloring</title>
  </head>
  <body>
    <div id="app">
      <h1>Luminance extraction + normal packer for dynamic recoloring</h1>

      <!-- 1. Drop zones + original previews -->
      <div id="drop-row">
        <div id="drop-zone-wrap">
          <h2>Texture</h2>
          <div id="drop-zone" class="drop-zone" tabindex="0">
            <p>Drop a texture here or click to select.</p>
            <p class="formats">PNG, JPG, WebP</p>
            <input type="file" id="file-input" class="file-input" accept="image/png,image/jpeg,image/webp" />
          </div>
        </div>
        <div id="original-wrap" class="hidden">
          <h2>Original</h2>
          <canvas id="canvas-original"></canvas>
        </div>
        <div id="drop-zone-normal-wrap">
          <h2>Normal Map</h2>
          <div id="drop-zone-normal" class="drop-zone" tabindex="0">
            <p>Drop a normal map here or click to select.</p>
            <p class="formats">PNG, JPG, WebP</p>
            <input type="file" id="file-input-normal" class="file-input" accept="image/png,image/jpeg,image/webp" />
          </div>
        </div>
        <div id="normal-wrap" class="hidden">
          <h2>Normal</h2>
          <canvas id="canvas-normal"></canvas>
        </div>
      </div>
      <div id="error-message" class="hidden"></div>

      <!-- 2. Grayscale -->
      <section id="section-grayscale" class="hidden">
        <div id="clamp-controls">
          <label>
            <span class="clamp-label">Dark clamp</span>
            <input type="range" id="clamp-low" min="0" max="25" step="0.1" value="0.1" />
            <span class="clamp-value" id="clamp-low-value">0.1%</span>
          </label>
          <label>
            <span class="clamp-label">Light clamp</span>
            <input type="range" id="clamp-high" min="0" max="25" step="0.1" value="0.1" />
            <span class="clamp-value" id="clamp-high-value">0.1%</span>
          </label>
        </div>
        <div id="images-row">
          <div>
            <h2>Luminance</h2>
            <canvas id="canvas-grayscale-lum"></canvas>
          </div>
          <div id="packed-lum-wrap" class="hidden">
            <h2>Packed</h2>
            <canvas id="canvas-packed-lum" class="checkerboard"></canvas>
          </div>
        </div>
      </section>

      <!-- 4. Gradient mapped output -->
      <section id="section-gradient" class="hidden">
        <div id="color-pickers">
          <label>
            Color A (dark)
            <input type="color" id="picker-dark" value="#000000" />
          </label>
          <label>
            Color B (light)
            <input type="color" id="picker-light" value="#ffffff" />
          </label>
        </div>
        <div id="recolored-and-3d-row">
          <div id="recolored-wrap">
            <h2>Recolored</h2>
            <canvas id="canvas-luminance"></canvas>
          </div>

          <section id="section-3d" class="hidden">
            <h2 id="three-heading">3D Preview</h2>
            <div id="three-controls">
              <label>
                <span class="clamp-label">Texture size</span>
                <input type="range" id="tex-size" min="0.5" max="10" step="0.1" value="2" />
                <span class="clamp-value" id="tex-size-value">2.0×</span>
              </label>
              <label>
                <span class="clamp-label">Light</span>
                <input type="range" id="light-intensity" min="0" max="10" step="0.05" value="5" />
                <span class="clamp-value" id="light-intensity-value">5.00</span>
              </label>
              <label>
                <span class="clamp-label">Normal scale</span>
                <input type="range" id="normal-scale" min="0" max="5" step="0.05" value="1" />
                <span class="clamp-value" id="normal-scale-value">1.00</span>
              </label>
              <div id="material-toggle">
                <button id="btn-mat-standard" class="toggle-btn active" type="button">Standard</button>
                <button id="btn-mat-lambert" class="toggle-btn" type="button">Lambert</button>
              </div>
            </div>
            <div id="three-container"></div>
          </section>
        </div>

        <h2 id="tiled-heading">Tiled</h2>
        <canvas id="canvas-gradient"></canvas>
      </section>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
